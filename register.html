<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page - HappyCart</title>

    <link rel="stylesheet" href="css/register.css">
    
</head>
<body>

        <form action="">

            <legend>Join Us and Start Your Journey</legend>

            <br>

            <label for="fullname">Full Name</label>
            <input type="text" id="Full Name" placeholder="e.g. John Doe" required>
            <br><br>

            <label for="email">Email Adress</label>
            <input type="email" id="email" placeholder="e.g. abc@gmail.com" required>
            <br><br>

            <label for="pwd">Password</label>
            <input type="password" id="pwd" placeholder="e.g. Create your password" required>
            <br><br>

            <label for="yob">Birth Day</label>
            <input type="date" id="yob" required>
            <br><br>

            <label for="dt">Date and Time</label>
            <input type="datetime-local" id="dt" required>
            <br><br>

            <label for="file">Upload CV/Resume</label>
            <input type="file" id="file" required>
            <br><br>

            <label for="age">What is your age?</label>
            <input type="number">
            <br><br>

            <label for="nationality">Select Nationality</label>

            <!--DropDown-->

            <select name="" id="nationality">

             <option value="" disabled>--Choose One --</option>
                <option value="">French</option>
                <option value="">Italian</option>
                <option value="">Germany</option>

            </select>

            <!--End of DropDown-->

            <br><br>

            <label for="gender">Select Gender</label>

            <Br></Br>

            <input type="radio" id="male" name="Male">
            <label for="male">Male</label> <br>

            <input type="radio" id="female" name="Female">
            <label for="female">Female</label> <br>
            
            <input type="radio" id="other" name="Other">
            <label for="other">Other</label> <br>

            <!--Example of a Check scenarios-->

            
            <label for="terms">I agree to the terms</label>
            <input type="checkbox" id="terms" name="agreement" value="accepted">

            
            <!---Example of a text area-->

            <label for="bio">Short Biography</label>
            <textarea id="bio" name="user_bio" rows="3" cols="40" placeholder="Tell us about yourself"></textarea>

            
            <!---Register Button-->

            <button type="submit" name="Register_btn">Register Now</button>

        </form>





</body>
</html>
